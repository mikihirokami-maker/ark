<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: #fff;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        /* メインビジュアル部分 */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('https://via.placeholder.com/450x600') center/cover;
            padding: 20px 10px;
            color: white;
            position: relative;
        }
        .top-text {
            font-weight: bold;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .pink-text { color: #ff00ff; }
        .orange-text { color: #ff6600; }

        .logo-area {
            background: white;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            border: 2px solid #eee;
            color: #333;
            font-weight: bold;
        }

        .main-copy {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.2;
            text-shadow: 3px 3px 0px #fff, -1px -1px 0px #fff, 1px -1px 0px #fff, -1px 1px 0px #fff;
            color: #ff3399; /* グラデーションのベース色 */
        }

        /* 説明文エリア */
        .description-box {
            background-color: #5d2b1e;
            color: white;
            padding: 15px;
            font-size: 14px;
            line-height: 1.6;
        }
        .highlight-yellow { color: #ffff00; font-weight: bold; }

        /* LINEボタンエリア */
        .line-section {
            background-color: #00b9ff;
            padding: 20px 10px;
            color: white;
        }
        .line-btn {
            background-color: #06c755;
            color: white;
            text-decoration: none;
            display: block;
            padding: 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 20px;
            margin: 10px 20px;
            box-shadow: 0 4px 0 #05a346;
        }
        .footer-note {
            font-size: 12px;
            color: #666;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="top-text">
                <span class="pink-text">お金を払ってやる</span><br>
                <span class="orange-text">関係はもう終わり！</span>
            </div>
            
            <div class="logo-area">Ai@m</div>

            <div class="main-copy">
                パパ活よりも<br>
                コスパがいい！
            </div>
        </div>

        <div class="description-box">
            ヤリモク女性が多いアイアムには<br>
            性欲を持て余した女性が勢揃い！<br>
            マッチ率は<span class="highlight-yellow">脅威の99%超え！</span>
        </div>

        <div class="line-section">
            <div>簡単登録 LINE 友達追加するだけ</div>
            <div style="font-weight: bold; font-size: 20px;">ヤリモク女性と今すぐ会える！</div>
            
            <div style="margin-top: 20px; color: #ff00ff; font-weight: bold;">\ 予定が合えば即会える！ /</div>
            <a href="#" class="line-btn">FREE 無料で友達追加する</a>
        </div>

        <div class="footer-note">
            ※18歳未満のご利用は固くお断りします。
        </div>
    </div>
</body>
</html>
